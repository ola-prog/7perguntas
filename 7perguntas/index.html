function getCordaScores(answers) {
  const scores = {};
  Object.entries(CORDAS).forEach(([key, corda]) => {
    const pts = corda.questions.reduce((sum, qi) => sum + (answers[qi]?.value || 0), 0);
    const max = corda.questions.length * 3;
    scores[key] = { pts, max, pct: Math.round((pts / max) * 100) };
  });
  return scores;
}

function getDiagnosis(cordaScores, totalScore) {
  let weakest = null, strongest = null, lowestPct = 101, highestPct = -1;
  Object.entries(cordaScores).forEach(([key, s]) => {
    if (s.pct < lowestPct) { lowestPct = s.pct; weakest = key; }
    if (s.pct > highestPct) { highestPct = s.pct; strongest = key; }
  });
  const { estrategia, marca, cultura, experiencia } = cordaScores;
  let pattern = null;
  if (estrategia.pct >= 67 && cultura.pct <= 33) pattern = "foguete";
  else if (cultura.pct >= 67 && marca.pct <= 33) pattern = "fundador";
  else if (experiencia.pct <= 33 && estrategia.pct <= 33) pattern = "ferida";
  else if (marca.pct >= 67 && experiencia.pct <= 33) pattern = "fachada";
  else if (estrategia.pct <= 50 && cultura.pct <= 50 && experiencia.pct <= 50) pattern = "invisivel";
  const crossKey = `${strongest}-${weakest}`;
  const crossText = crossings[crossKey] || `Sua dimensão mais forte é ${CORDAS[strongest].name} e a mais fraca é ${CORDAS[weakest].name}. Essa combinação indica oportunidade clara de evolução.`;
  return { weakest, strongest, pattern, crossText };
}

              <div style={{ display: "inline-flex", padding: "8px 20px", borderRadius: 100, fontSize: "0.7rem", fontWeight: 700, letterSpacing: "0.15em", textTransform: "uppercase", marginBottom: 20, background: `${badgeColor}15`, border: `1px solid ${badgeColor}30`, color: badgeColor }}>{level.badge}</div>
              <div style={{ fontFamily: serif, fontSize: "3.5rem", fontWeight: 600, lineHeight: 1, color: "#f0f0f0", marginBottom: 16 }}>{totalScore} <span style={{ fontSize: "1.2rem", color: "#555", fontWeight: 400 }}>/ 21</span></div>
              <h2 style={{ fontFamily: serif, fontSize: "1.4rem", color: "#f0f0f0", marginBottom: 8 }}>{level.title}</h2>
            </div>

            {/* BLOCO 1: Barras */}
            <div style={{ ...card, marginBottom: 24 }}>
              <div style={{ ...lbl, marginBottom: 24 }}>Visão geral</div>
              {Object.entries(CORDAS).map(([key, corda], i) => (<CordaBar key={key} name={corda.name} color={corda.color} pts={cordaScores[key].pts} max={cordaScores[key].max} pct={cordaScores[key].pct} delay={i*150} blurred={false} />))}
            </div>

            {/* BLOCO 2: Raio-X por dimensão */}
            <div style={{ marginBottom: 24 }}>
              <div style={{ ...lbl, marginBottom: 16 }}>Raio-X por dimensão</div>
              {Object.entries(CORDAS).map(([key, corda]) => (<DimensionCard key={key} cordaKey={key} pts={cordaScores[key].pts} max={cordaScores[key].max} color={corda.color} icon={corda.icon} />))}
            </div>

            {/* BLOCO 3: Cruzamento */}
            <div style={{ ...card, marginBottom: 16, borderTop: `2px solid ${CORDAS[diagnosis.strongest].color}` }}>
              <div style={{ ...lbl, color: "#00D4AA", marginBottom: 16 }}>O cruzamento</div>
              <p style={{ fontSize: "0.9rem", color: "#b0b0b0", lineHeight: 1.8, marginBottom: 12 }}>
                Dimensão mais forte: <strong style={{ color: CORDAS[diagnosis.strongest].color }}>{CORDAS[diagnosis.strongest].name}</strong>. Mais fraca: <strong style={{ color: CORDAS[diagnosis.weakest].color }}>{CORDAS[diagnosis.weakest].name}</strong>.
              </p>
              <p style={{ fontSize: "0.9rem", color: "#999", lineHeight: 1.85 }}>{diagnosis.crossText}</p>
            </div>

            {/* BLOCO 4: Padrão */}
            {diagnosis.pattern && patternsData[diagnosis.pattern] && (
              <div style={{ ...card, marginBottom: 16, borderTop: "2px solid #A855F7" }}>
                <div style={{ ...lbl, color: "#A855F7", marginBottom: 16 }}>Padrão identificado</div>
                <h3 style={{ fontFamily: serif, fontSize: "1.15rem", color: "#f0f0f0", marginBottom: 16 }}>{patternsData[diagnosis.pattern].name}</h3>
                <div style={{ ...lbl, color: "#666", marginBottom: 12 }}>Sinais que você provavelmente reconhece:</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 20 }}>
                  {patternsData[diagnosis.pattern].signs.map((sign, i) => (
                    <div key={i} style={{ display: "flex", gap: 12, alignItems: "flex-start" }}>
                      <span style={{ color: "#A855F7", fontSize: "0.75rem", marginTop: 4, minWidth: 12 }}>•</span>
                      <span style={{ fontSize: "0.88rem", color: "#999", lineHeight: 1.7 }}>{sign}</span>
                    </div>
                  ))}
                </div>
                <p style={{ fontSize: "0.9rem", color: "#b0b0b0", lineHeight: 1.8 }}>{patternsData[diagnosis.pattern].desc}</p>
              </div>
            )}

            {/* BLOCO 5: Custo */}
            <div style={{ ...card, marginBottom: 16, borderTop: "2px solid #FFAA00" }}>
              <div style={{ ...lbl, color: "#FFAA00", marginBottom: 16 }}>O que isso custa</div>
              <p style={{ fontSize: "0.9rem", color: "#999", lineHeight: 1.85 }}>{costInsights[levelKey]}</p>
            </div>

            {/* BLOCO IA: Diagnóstico personalizado */}
            {aiInsight && (
              <div style={{ ...card, marginBottom: 16, borderTop: "2px solid #00D4AA", background: "#060a08", borderColor: "#0d2019" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 20 }}>
                  <div style={{ width: 24, height: 24, borderRadius: "50%", background: "rgba(0,212,170,0.15)", display: "flex", alignItems: "center", justifyContent: "center" }}>
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#00D4AA" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                  </div>
                  <span style={{ ...lbl, color: "#00D4AA", margin: 0 }}>{siteAnalyzed ? "Leitura estratégica · site + diagnóstico cruzados por IA" : "Leitura estratégica · gerada por IA"}</span>
                </div>
                <div style={{ fontSize: "0.92rem", color: "#b0b0b0", lineHeight: 1.85 }} dangerouslySetInnerHTML={{ __html: aiInsight }} />
              </div>
            )}

            {/* BLOCO 6: O que não aparece */}
            <div style={{ ...card, marginBottom: 32, background: "#080808", borderColor: "#1a1a1a" }}>
              <div style={{ ...lbl, color: "#888", marginBottom: 16 }}>O que não aparece aqui</div>
              <p style={{ fontSize: "0.95rem", color: "#b0b0b0", lineHeight: 1.85, marginBottom: 14 }}>
                7 perguntas mostram <strong style={{ color: "#f0f0f0" }}>onde</strong> dói. Não mostram <strong style={{ color: "#f0f0f0" }}>por quê</strong>.
              </p>
              <p style={{ fontSize: "0.9rem", color: "#888", lineHeight: 1.85 }}>
                Para isso, é preciso ouvir quem nunca é ouvido, encontrar o que a empresa evita olhar, e nomear a contradição que ninguém quer admitir. É desconfortável. Mas é o único caminho que funciona.
              </p>
            </div>

            {/* Breakdown */}
            <div style={{ marginBottom: 32 }}>
              <div style={{ ...lbl, marginBottom: 14 }}>Suas respostas</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                {answers.map((a, i) => {
                  const c = a.level === "good" ? "#00D4AA" : a.level === "mid" ? "#FFAA00" : "#FF4757";
                  const bg = a.level === "good" ? "rgba(0,212,170,0.08)" : a.level === "mid" ? "rgba(255,170,0,0.08)" : "rgba(255,71,87,0.08)";
                  return (<div key={i} style={{ display: "flex", alignItems: "center", gap: 14, padding: "12px 18px", background: "#0a0a0a", border: "1px solid #151515", borderRadius: 10 }}>
                    <div style={{ width: 6, height: 6, borderRadius: "50%", background: CORDAS[a.corda].color, minWidth: 6 }} />
                    <div style={{ flex: 1, fontSize: "0.82rem", color: "#999" }}>{a.question}</div>
                    <div style={{ fontSize: "0.72rem", fontWeight: 600, padding: "3px 10px", borderRadius: 100, background: bg, color: c }}>{a.value === 3 ? "✓" : a.value === 1 ? "~" : "✗"}</div>
                  </div>);
                })}
              </div>
            </div>

            {/* CTA */}
            <div style={{ textAlign: "center", padding: "40px 28px", background: "#080808", border: "1px solid #1a1a1a", borderRadius: 20, marginBottom: 40 }}>
              <div style={{ fontFamily: serif, fontStyle: "italic", fontSize: "1rem", color: "#555", marginBottom: 10 }}>"Esse diagnóstico revela onde sua marca está perdendo força."</div>
              <h3 style={{ fontFamily: serif, fontSize: "1.5rem", color: "#f0f0f0", marginBottom: 10 }}>A conversa revela por quê.</h3>
              <p style={{ fontSize: "0.85rem", color: "#555", marginBottom: 32, maxWidth: 360, margin: "0 auto 32px" }}>Uma conversa de 30 minutos com nosso time de estratégia. Sem compromisso, sem apresentação comercial. Só clareza sobre o que fazer a partir daqui.</p>
              <button style={{ display: "inline-flex", alignItems: "center", gap: 10, padding: "18px 44px", background: "#25D366", color: "#fff", border: "none", borderRadius: 60, fontSize: "0.95rem", fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>Conversar com a Enredo</button>
              <div style={{ display: "flex", justifyContent: "center", gap: 12, marginTop: 20 }}>
                <button onClick={() => { setScreen("intro"); setCurrentQ(0); setAnswers([]); setSelected(null); setForm({ name: "", email: "", whatsapp: "" }); setAiInsight(null); setAiReady(false); setSiteAnalyzed(false); setLoadingStep(0); }} style={{ padding: "12px 24px", background: "transparent", border: "1px solid #1a1a1a", borderRadius: 60, color: "#555", fontSize: "0.8rem", cursor: "pointer", fontFamily: "inherit" }}>Refazer diagnóstico</button>
              </div>
            </div>
            <div style={{ textAlign: "center", fontSize: "0.65rem", color: "#2a2a2a", paddingBottom: 20 }}>Diagnóstico de Marca · enredo:co © 2026</div>
          </div>
        )}
      </div>

      <style>{`
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:0.3 } }
        @keyframes shimmer { 0% { background-position:100% 0 } 100% { background-position:0 0 } }
        input::placeholder { color: #555 !important; }
        input:focus { border-color: #00D4AA !important; background: rgba(0,212,170,0.05) !important; }
        strong { color: #f0f0f0; font-weight: 600; }
      `}</style>
    </div>
  );
}


    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(DiagnosticoV4));
    </script>
</body>
</html>
